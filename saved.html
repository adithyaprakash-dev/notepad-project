<!DOCTYPE html>
<html>
<head>
    <title>Saved Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📂 Saved Notes</h1>
    <select id="sortSelect" onchange="displayNotes()">
    <option value="new">Newest First</option>
    <option value="old">Oldest First</option>
    <option value="pinned">Pinned First</option>
    <option value="category">Category A–Z</option>
</select>
    <div class="top-bar">
    <button onclick="exportNotes()">⬇ Export Notes</button>
    <input type="file" id="importFile" accept=".json" onchange="importNotes(event)">
    <input type="text" id="searchBox" placeholder="Search notes..." onkeyup="searchNotes()">
</div>
    <div id="notesList" class="notes-grid"></div>
    
  <h2 onclick="toggleArchiveSection()" style="cursor:pointer;">
    📦 Archived Notes (<span id="archiveCount">0</span>)
</h2>

<div id="archivedList" class="notes-grid" style="display:none;"></div>
    <br>

    <a href="index.html">
        <button>Back to Notepad</button>
    </a>
</div>
<div id="toast"></div>
<script src="script.js"></script>
</body>
</html>
